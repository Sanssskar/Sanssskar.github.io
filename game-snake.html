<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Snake Game | Sanskar Shrestha Games</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .game-container {
            max-width: 500px;
            margin: 2rem auto;
            padding: 2rem;
            background: var(--bg-secondary);
            border-radius: 2rem;
            text-align: center;
            border: 1px solid var(--border-medium);
        }
        canvas {
            background: var(--bg-primary);
            border-radius: 1rem;
            margin: 1rem auto;
            display: block;
            border: 2px solid var(--border-medium);
        }
        .btn-back {
            background: var(--gradient-1);
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        @media (max-width: 768px) {
            canvas { width: 100%; height: auto; }
            .game-container { margin: 1rem; padding: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-container">
            <h1><i class="fa-solid fa-snake"></i> Classic Snake Game ⚔️</h1>
            <canvas id="snakeCanvas" width="400" height="400"></canvas>
            <p>Score: <span id="score" style="font-weight: bold; font-size: 1.5rem; color: var(--accent-1);">0</span></p>
            <button id="startBtn" class="btn btn-primary">Start Game</button>
            <button id="resetBtn" class="btn btn-outline">Reset</button>
            <p style="margin-top: 0.5rem; font-size: 0.8rem;">Use arrow keys to control</p>
            <br>
            <a href="games.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Back to Games</a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('snakeCanvas');
        const ctx = canvas.getContext('2d');
        
        let snake = [{x: 200, y: 200}];
        let direction = {x: 20, y: 0};
        let food = {x: 300, y: 200};
        let score = 0;
        let gameRunning = false;
        let gameInterval;
        
        function randomFood() {
            food = {
                x: Math.floor(Math.random() * 20) * 20,
                y: Math.floor(Math.random() * 20) * 20
            };
            for (let segment of snake) {
                if (segment.x === food.x && segment.y === food.y) randomFood();
            }
        }
        
        function draw() {
            ctx.clearRect(0, 0, 400, 400);
            ctx.fillStyle = '#4caf50';
            for (let segment of snake) {
                ctx.fillRect(segment.x, segment.y, 18, 18);
            }
            ctx.fillStyle = '#ff4757';
            ctx.fillRect(food.x, food.y, 18, 18);
        }
        
        function update() {
            const head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};
            
            if (head.x < 0 || head.x >= 400 || head.y < 0 || head.y >= 400) {
                gameOver();
                return;
            }
            
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }
            
            snake.unshift(head);
            
            if (head.x === food.x && head.y === food.y) {
                score++;
                document.getElementById('score').innerText = score;
                randomFood();
            } else {
                snake.pop();
            }
            
            draw();
        }
        
        function gameOver() {
            clearInterval(gameInterval);
            gameRunning = false;
            alert(`Game Over! Your score: ${score}`);
        }
        
        function startGame() {
            if (gameRunning) return;
            snake = [{x: 200, y: 200}];
            direction = {x: 20, y: 0};
            score = 0;
            document.getElementById('score').innerText = '0';
            randomFood();
            gameRunning = true;
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(update, 150);
            draw();
        }
        
        function resetGame() {
            clearInterval(gameInterval);
            gameRunning = false;
            snake = [{x: 200, y: 200}];
            direction = {x: 20, y: 0};
            score = 0;
            document.getElementById('score').innerText = '0';
            randomFood();
            draw();
        }
        
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            switch(e.key) {
                case 'ArrowUp': if (direction.y === 0) direction = {x: 0, y: -20}; break;
                case 'ArrowDown': if (direction.y === 0) direction = {x: 0, y: 20}; break;
                case 'ArrowLeft': if (direction.x === 0) direction = {x: -20, y: 0}; break;
                case 'ArrowRight': if (direction.x === 0) direction = {x: 20, y: 0}; break;
            }
        });
        
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('resetBtn').addEventListener('click', resetGame);
        
        draw();
    </script>
</body>
</html>
