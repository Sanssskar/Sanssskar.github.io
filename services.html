    <style>
        .page-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .page-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        /* Projects Grid */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }

        .project-card {
            background: var(--bg-secondary);
            border-radius: 1.5rem;
            padding: 1.5rem;
            border: 1px solid var(--border-medium);
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: var(--gradient-1);
            transform: translateX(-100%);
            transition: transform 0.4s;
        }

        .project-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--hover-shadow);
        }

        .project-card:hover::before {
            transform: translateX(0);
        }

        .project-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 1rem;
            margin-bottom: 1rem;
        }

        .project-card h3 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .project-card p {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .project-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .project-tag {
            background: var(--bg-primary);
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            border: 1px solid var(--border-light);
        }

        /* Pagination */
        .pagination-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin: 2rem 0 1rem;
            flex-wrap: wrap;
        }

        .page-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-medium);
            color: var(--text-primary);
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .page-btn:hover:not(:disabled) {
            background: var(--gradient-1);
            color: white;
            transform: translateY(-2px);
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .page-numbers {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .page-number {
            background: var(--bg-secondary);
            border: 1px solid var(--border-medium);
            color: var(--text-primary);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .page-number:hover {
            background: var(--accent-2);
            color: white;
            transform: translateY(-2px);
        }

        .page-number.active-page {
            background: var(--gradient-1);
            color: white;
            border-color: transparent;
        }

        /* Social Links Hover */
        .top-social-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--bg-secondary);
            color: var(--text-secondary);
            transition: all 0.3s;
            font-size: 1.2rem;
            text-decoration: none;
            border: 1px solid var(--border-medium);
        }
        .top-social-link:hover {
            transform: translateY(-3px);
            border-color: transparent;
        }
        .top-social-link[title="Facebook"]:hover { background: #1877f2; color: white; }
        .top-social-link[title="Instagram"]:hover { background: linear-gradient(45deg, #f09433, #d62976, #962fbf, #4f5bd5); color: white; }
        .top-social-link[title="LinkedIn"]:hover { background: #0077b5; color: white; }
        .top-social-link[title="GitHub"]:hover { background: #333; color: white; }
        .top-social-link[title="WhatsApp"]:hover { background: #25D366; color: white; }
        .top-social-link[title="Email"]:hover { background: #ea4335; color: white; }

        /* Fix for scale-up animation on dynamic content */
        .project-card {
            opacity: 1 !important;
            transform: scale(1) !important;
        }

        @media (max-width: 768px) {
            .projects-grid { grid-template-columns: 1fr; gap: 1.5rem; }
            .project-card h3 { font-size: 1.3rem; }
            .page-header h1 { font-size: 2rem; }
        }
        @media (max-width: 480px) {
            .project-img { height: 160px; }
            .project-card { padding: 1rem; }
            .page-header h1 { font-size: 1.8rem; }
        }
    </style>
</head>

    <script src="js/main.js"></script>
    <script>
        const allProjects = [
            { title: "Home Link Services Pvt.Ltd", description: "Modernized outdated website with dynamic and responsive elements. Added modern UI components and improved performance.", image: "images/homelink.png", tags: ["Laravel", "Tailwind CSS", "JavaScript"], repo: "https://homelinkservice.com/" },
            { title: "Koseli Express", description: "E-commerce platform with inventory tracking and out-of-stock indicators. Implemented real-time stock management and order processing.", image: "images/koseli.png", tags: ["Laravel", "MySQL", "Payment Gateway"], repo: "https://www.koselixpress.com.np/" },
            { title: "Product API", description: "REST API with authentication, cart management, orders, products, categories, and payment processing for mobile applications.", image: "images/api.jpg", tags: ["Laravel", "REST API", "Sanctum"], repo: "https://www.linkedin.com/posts/sanskar-shrestha-a750933b1_laravel-filament-restapi-activity-7431273261516173312-mFtI" },
            { title: "Student Portal API", description: "API for students to access paid courses, purchase new ones, and receive certificates via email. Complete learning management system backend.", image: "images/studentport.png", tags: ["Laravel", "REST API", "Mail Integration"], repo: "https://www.linkedin.com/in/sanskar-shrestha-a750933b1/recent-activity-all/" },
            { title: "SudamHub", description: "Dynamic team website with blogs, team profiles, and project showcases using Laravel Filament, HTML, Tailwind CSS, and JavaScript.", image: "images/sudamhub.png", tags: ["Laravel", "Filament", "Tailwind CSS"], repo: "https://sudamhub.com/" }
        ];

        let currentPage = 1;
        const projectsPerPage = 3;
        let totalPages = Math.ceil(allProjects.length / projectsPerPage);

        function renderProjects() {
            const grid = document.getElementById('projectsGrid');
            const currentProjects = allProjects.slice((currentPage - 1) * projectsPerPage, currentPage * projectsPerPage);
            grid.innerHTML = currentProjects.map(p => `
                <div class="project-card">
                    <img class="project-img" src="${p.image}" alt="${p.title}" loading="lazy" onerror="this.src='https://via.placeholder.com/400x200?text=${encodeURIComponent(p.title)}'">
                    <h3>${p.title}</h3>
                    <p>${p.description}</p>
                    <div class="project-tags">${p.tags.map(t => `<span class="project-tag">${t}</span>`).join('')}</div>
                    <div style="margin-top:1rem;">
                        <a href="${p.repo}" target="_blank" style="color:var(--accent-1);text-decoration:none;display:inline-flex;align-items:center;gap:0.5rem;font-weight:600;">
                            <i class="fa-solid fa-external-link"></i> View Project ⚔️
                        </a>
                    </div>
                </div>
            `).join('');
        }

        function renderPagination() {
            const c = document.getElementById('paginationContainer');
            if (!c || totalPages <= 1) { 
                if (c) c.style.display = 'none'; 
                return; 
            }
            c.style.display = 'flex';
            let html = `<button class="page-btn" id="prevPage" ${currentPage === 1 ? 'disabled' : ''}><i class="fa-solid fa-chevron-left"></i> Previous</button>
                        <div class="page-numbers">`;
            for (let i = 1; i <= totalPages; i++) {
                html += `<button class="page-number ${currentPage === i ? 'active-page' : ''}" data-page="${i}">${i}</button>`;
            }
            html += `</div><button class="page-btn" id="nextPage" ${currentPage === totalPages ? 'disabled' : ''}>Next <i class="fa-solid fa-chevron-right"></i></button>`;
            c.innerHTML = html;
            
            const scrollToProjects = () => { 
                const projectsSection = document.getElementById('projectsGrid'); 
                if (projectsSection) { 
                    window.scrollTo({ top: projectsSection.offsetTop - 100, behavior: 'smooth' }); 
                } 
            };
            
            // Remove old event listeners and add new ones
            const prevBtn = document.getElementById('prevPage');
            const nextBtn = document.getElementById('nextPage');
            
            if (prevBtn) {
                prevBtn.replaceWith(prevBtn.cloneNode(true));
                const newPrevBtn = document.getElementById('prevPage');
                newPrevBtn.addEventListener('click', () => { 
                    if (currentPage > 1) { 
                        currentPage--; 
                        renderProjects(); 
                        renderPagination(); 
                        scrollToProjects(); 
                    } 
                });
            }
            
            if (nextBtn) {
                nextBtn.replaceWith(nextBtn.cloneNode(true));
                const newNextBtn = document.getElementById('nextPage');
                newNextBtn.addEventListener('click', () => { 
                    if (currentPage < totalPages) { 
                        currentPage++; 
                        renderProjects(); 
                        renderPagination(); 
                        scrollToProjects(); 
                    } 
                });
            }
            
            document.querySelectorAll('.page-number').forEach(btn => {
                btn.replaceWith(btn.cloneNode(true));
            });
            
            document.querySelectorAll('.page-number').forEach(btn => {
                btn.addEventListener('click', e => { 
                    const page = parseInt(e.target.getAttribute('data-page')); 
                    if (page && page !== currentPage) { 
                        currentPage = page; 
                        renderProjects(); 
                        renderPagination(); 
                        scrollToProjects(); 
                    } 
                });
            });
        }

        renderProjects();
        renderPagination();
        
        document.addEventListener('DOMContentLoaded', function() {
            const currentPath = window.location.pathname;
            const currentPageName = currentPath.split('/').pop() || 'projects.html';
            document.querySelectorAll('.nav-links li a').forEach(link => {
                const linkHref = link.getAttribute('href').split('/').pop();
                if (linkHref === currentPageName) link.classList.add('active');
            });
        });
    </script>
