<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Memory Match | Sanskar Shrestha Games</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .game-container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 2rem;
            background: var(--bg-secondary);
            border-radius: 2rem;
            text-align: center;
            border: 1px solid var(--border-medium);
        }
        .memory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.8rem;
            margin: 2rem 0;
        }
        .memory-card {
            background: var(--gradient-1);
            height: 80px;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .memory-card.flipped { background: var(--accent-2); transform: rotateY(180deg); }
        .btn-back {
            background: var(--gradient-1);
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        @media (max-width: 768px) {
            .memory-card { height: 60px; font-size: 1.5rem; }
            .game-container { margin: 1rem; padding: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-container">
            <h1><i class="fa-solid fa-brain"></i> Memory Match ⚔️</h1>
            <p>Moves: <span id="moves" style="font-weight: bold;">0</span> | Matches: <span id="matches" style="font-weight: bold;">0</span>/8</p>
            <div class="memory-grid" id="memoryGrid"></div>
            <button id="resetBtn" class="btn btn-primary">New Game</button>
            <br><br>
            <a href="games.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Back to Games</a>
        </div>
    </div>

    <script>
        const emojis = ['🐘', '🦁', '🐒', '🐧', '🦊', '🐼', '🐨', '🐸'];
        let cards = [];
        let flippedCards = [];
        let lockedBoard = false;
        let moves = 0;
        let matchedPairs = 0;

        function initGame() {
            cards = [...emojis, ...emojis];
            for (let i = cards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cards[i], cards[j]] = [cards[j], cards[i]];
            }
            flippedCards = [];
            lockedBoard = false;
            moves = 0;
            matchedPairs = 0;
            document.getElementById('moves').innerText = '0';
            document.getElementById('matches').innerText = '0/8';
            renderBoard();
        }

        function renderBoard() {
            const grid = document.getElementById('memoryGrid');
            grid.innerHTML = cards.map((card, index) => `
                <div class="memory-card" data-index="${index}" data-flipped="${flippedCards.includes(index)}">
                    ${flippedCards.includes(index) ? card : '❓'}
                </div>
            `).join('');
            
            document.querySelectorAll('.memory-card').forEach(card => {
                card.addEventListener('click', () => handleCardClick(parseInt(card.dataset.index)));
            });
        }

        function handleCardClick(index) {
            if (lockedBoard) return;
            if (flippedCards.includes(index)) return;
            if (flippedCards.length === 2) return;
            
            flippedCards.push(index);
            moves++;
            document.getElementById('moves').innerText = moves;
            renderBoard();
            
            if (flippedCards.length === 2) {
                lockedBoard = true;
                const card1 = cards[flippedCards[0]];
                const card2 = cards[flippedCards[1]];
                
                if (card1 === card2) {
                    matchedPairs++;
                    document.getElementById('matches').innerText = `${matchedPairs}/8`;
                    flippedCards = [];
                    lockedBoard = false;
                    renderBoard();
                    if (matchedPairs === 8) {
                        setTimeout(() => alert(`🎉 Perfect! You won in ${moves} moves! 🎉`), 100);
                    }
                } else {
                    setTimeout(() => {
                        flippedCards = [];
                        lockedBoard = false;
                        renderBoard();
                    }, 800);
                }
            }
        }

        document.getElementById('resetBtn').addEventListener('click', initGame);
        initGame();
    </script>
</body>
</html>
