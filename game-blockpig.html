<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Block the Pig | Sanskar Shrestha Games</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .game-container { max-width: 600px; margin: 2rem auto; padding: 2rem; background: var(--bg-secondary); border-radius: 2rem; text-align: center; border: 1px solid var(--border-medium); }
        .board { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; background: #5d4037; padding: 1rem; border-radius: 1rem; margin: 1rem 0; }
        .cell { aspect-ratio: 1; background: #8d6e63; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; transition: all 0.2s; }
        .cell.blocked { background: #4caf50; cursor: not-allowed; }
        .cell.pig { background: #ff9800; position: relative; }
        .cell.empty:hover:not(.blocked) { background: #a1887f; transform: scale(0.95); }
        .info { margin: 1rem 0; }
        .score { font-size: 1.5rem; font-weight: bold; color: var(--accent-1); }
        .btn-back { background: var(--gradient-1); color: white; padding: 0.8rem 1.5rem; border-radius: 50px; text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; margin-top: 1rem; }
        @media (max-width: 600px) { .cell { font-size: 1rem; } .board { gap: 3px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-container">
            <h1><i class="fa-solid fa-puzzle-piece"></i> Block the Pig 🐷</h1>
            <p>Click on empty cells to place blocks. Trap the pig before it escapes!</p>
            <div class="info">Round: <span id="round" class="score">1</span> | Blocks Left: <span id="blocksLeft" class="score">10</span></div>
            <div class="board" id="board"></div>
            <div id="message" style="margin: 0.5rem 0; font-weight: bold; min-height: 50px;"></div>
            <button id="resetBtn" class="btn btn-primary">New Round</button>
            <br><br>
            <a href="games.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Back to Games</a>
        </div>
    </div>

    <script>
        const boardSize = 7;
        let board = [];
        let pigPos = { x: 3, y: 3 };
        let round = 1;
        let blocksLeft = 10;
        let gameActive = true;

        function initBoard() {
            board = Array(boardSize).fill().map(() => Array(boardSize).fill('empty'));
            pigPos = { x: 3, y: 3 };
            board[pigPos.y][pigPos.x] = 'pig';
            blocksLeft = Math.min(10 + round, 20);
            gameActive = true;
            renderBoard();
        }

        function renderBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            for (let y = 0; y < boardSize; y++) {
                for (let x = 0; x < boardSize; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if (board[y][x] === 'blocked') cell.classList.add('blocked');
                    if (board[y][x] === 'pig') {
                        cell.classList.add('pig');
                        cell.innerHTML = '🐷';
                    }
                    cell.addEventListener('click', () => onCellClick(x, y));
                    boardEl.appendChild(cell);
                }
            }
            document.getElementById('round').innerText = round;
            document.getElementById('blocksLeft').innerText = blocksLeft;
        }

        function onCellClick(x, y) {
            if (!gameActive) return;
            if (board[y][x] === 'pig') {
                document.getElementById('message').innerHTML = '🐷 You can\'t block the pig directly! Trap it by surrounding it!';
                return;
            }
            if (board[y][x] === 'blocked') {
                document.getElementById('message').innerHTML = '🚫 Already blocked here!';
                return;
            }
            if (blocksLeft <= 0) {
                document.getElementById('message').innerHTML = '❌ No blocks left! The pig escapes!';
                gameActive = false;
                return;
            }

            board[y][x] = 'blocked';
            blocksLeft--;
            renderBoard();

            if (!movePig()) {
                gameActive = false;
                document.getElementById('message').innerHTML = `🎉🐷 SUCCESS! You trapped the pig in Round ${round}! 🐷🎉 <br>Click New Round to continue!`;
            } else if (blocksLeft === 0) {
                gameActive = false;
                document.getElementById('message').innerHTML = '😢 The pig escaped! Game Over. Click New Round to try again!';
            }
        }

        function movePig() {
            const directions = [
                { dx: 0, dy: -1 }, // up
                { dx: 0, dy: 1 },  // down
                { dx: -1, dy: 0 }, // left
                { dx: 1, dy: 0 }   // right
            ];
            let possibleMoves = [];

            for (let dir of directions) {
                const newX = pigPos.x + dir.dx;
                const newY = pigPos.y + dir.dy;
                if (newX >= 0 && newX < boardSize && newY >= 0 && newY < boardSize && board[newY][newX] !== 'blocked') {
                    possibleMoves.push({ x: newX, y: newY });
                }
            }

            if (possibleMoves.length === 0) {
                return false;
            }

            const move = possibleMoves[Math.floor(Math.random() * possibleMoves.length)];
            board[pigPos.y][pigPos.x] = 'empty';
            pigPos = move;
            board[pigPos.y][pigPos.x] = 'pig';
            renderBoard();
            return true;
        }

        function resetGame() {
            round++;
            initBoard();
            document.getElementById('message').innerHTML = `Round ${round}! Place blocks to trap the pig!`;
        }

        document.getElementById('resetBtn').addEventListener('click', resetGame);
        initBoard();
    </script>
</body>
</html>
